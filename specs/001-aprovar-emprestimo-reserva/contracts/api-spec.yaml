openapi: 3.0.3
info:
  title: BFIN Loan Simulation Approval & Withdrawal API
  version: 1.0.0
  description: |
    API for approving loan simulations and withdrawing funds from emergency reserve.
    Extends the existing loan simulation endpoints with approval workflow and fund transfer capabilities.

servers:
  - url: http://localhost:3000/api/v1
    description: Development server
  - url: https://api.bfin.com/api/v1
    description: Production server

security:
  - bearerAuth: []

paths:
  /loan-simulations/{id}/approve:
    post:
      summary: Approve a loan simulation
      description: |
        Approves an existing loan simulation, marking it ready for fund withdrawal.

        **Business Rules**:
        - Simulation must be in PENDING status
        - Simulation must be created within last 30 days (expiration check)
        - Total active loans (approved + completed) must not exceed 70% of emergency reserve
        - Only the simulation owner can approve

        **State Transition**: PENDING → APPROVED
      operationId: approveLoanSimulation
      tags:
        - Loan Simulations
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the loan simulation to approve
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Simulation successfully approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalResponse'
              example:
                simulation:
                  id: "123e4567-e89b-12d3-a456-426614174000"
                  status: "APPROVED"
                  approvedAt: "2026-01-28T10:30:00.000Z"
                  withdrawnAt: null
                  amount: 500.00
                  termMonths: 12
                  interestRateMonthly: 0.025
                  installmentAmount: 44.24
                  totalInterest: 30.88
                  totalCost: 530.88
                  reserveUsagePercent: 50.00
                  reserveRemainingAmount: 500.00
                  createdAt: "2026-01-15T08:00:00.000Z"
                message: "Loan simulation approved successfully"
        '400':
          description: Bad request - validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                alreadyApproved:
                  summary: Already approved
                  value:
                    error: "Simulation is already approved"
                expired:
                  summary: Expired simulation
                  value:
                    error: "Simulation expired. Created 35 days ago. Maximum age is 30 days. Please create a new simulation."
                limitExceeded:
                  summary: Reserve limit exceeded
                  value:
                    error: "Total active loans would exceed 70% reserve limit. Current reserve: 1000.00, maximum allowed: 700.00, requested: 500.00"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Simulation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Loan simulation not found"

  /loan-simulations/{id}/withdraw:
    post:
      summary: Withdraw funds from approved simulation
      description: |
        Executes the fund withdrawal from emergency reserve to available balance for an approved simulation.

        **Business Rules**:
        - Simulation must be in APPROVED status
        - Emergency reserve must have sufficient balance
        - Total active loans must not exceed 70% of current emergency reserve (revalidation)
        - Transaction is atomic (all-or-nothing)

        **State Transition**: APPROVED → COMPLETED

        **Balance Changes** (atomic):
        - emergency_reserve: -principal_amount
        - available_balance: +principal_amount
        - total_balance: unchanged (internal transfer)
      operationId: withdrawLoanSimulation
      tags:
        - Loan Simulations
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the approved loan simulation
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Funds successfully withdrawn
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WithdrawalResponse'
              example:
                simulation:
                  id: "123e4567-e89b-12d3-a456-426614174000"
                  status: "COMPLETED"
                  approvedAt: "2026-01-28T10:30:00.000Z"
                  withdrawnAt: "2026-01-28T10:35:00.000Z"
                  amount: 500.00
                  termMonths: 12
                  interestRateMonthly: 0.025
                  installmentAmount: 44.24
                  totalInterest: 30.88
                  totalCost: 530.88
                  reserveUsagePercent: 50.00
                  reserveRemainingAmount: 500.00
                  createdAt: "2026-01-15T08:00:00.000Z"
                balances:
                  emergencyReserveBefore: 1000.00
                  emergencyReserveAfter: 500.00
                  availableBalanceBefore: 200.00
                  availableBalanceAfter: 700.00
                message: "Funds withdrawn successfully. Amount transferred to available balance."
        '400':
          description: Bad request - validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notApproved:
                  summary: Not approved
                  value:
                    error: "Cannot withdraw - simulation must be approved first"
                alreadyCompleted:
                  summary: Already completed
                  value:
                    error: "Simulation already completed - funds have been withdrawn"
                insufficientBalance:
                  summary: Insufficient reserve
                  value:
                    error: "Insufficient emergency reserve balance. Required: 500.00, available: 300.00"
                limitExceeded:
                  summary: Reserve limit exceeded (after reserve changes)
                  value:
                    error: "Total active loans would exceed 70% reserve limit. Current reserve: 800.00, maximum allowed: 560.00, requested: 500.00"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Simulation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Loan simulation not found"

  /loan-simulations/{id}:
    get:
      summary: Get loan simulation details
      description: |
        Retrieves complete details of a loan simulation including status and timestamps.
        **Extended** to include status, approvedAt, and withdrawnAt fields.
      operationId: getLoanSimulation
      tags:
        - Loan Simulations
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the loan simulation
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Simulation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoanSimulationDetails'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Simulation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /loan-simulations:
    get:
      summary: List loan simulations
      description: |
        Lists loan simulations for the authenticated user with optional status filtering.
        **Extended** to support status filtering and include status fields in response.
      operationId: listLoanSimulations
      tags:
        - Loan Simulations
      parameters:
        - name: status
          in: query
          required: false
          description: Filter by simulation status
          schema:
            $ref: '#/components/schemas/LoanSimulationStatus'
        - name: limit
          in: query
          required: false
          description: Number of results per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          required: false
          description: Number of results to skip
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: List of simulations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LoanSimulationSummary'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoanSimulationStatus:
      type: string
      enum:
        - PENDING
        - APPROVED
        - COMPLETED
      description: |
        Simulation lifecycle status:
        - PENDING: Created, not yet approved
        - APPROVED: Approved by user, ready for withdrawal
        - COMPLETED: Funds withdrawn, terminal state

    LoanSimulationDetails:
      type: object
      required:
        - id
        - status
        - amount
        - termMonths
        - interestRateMonthly
        - amortizationType
        - installmentAmount
        - totalInterest
        - totalCost
        - reserveUsagePercent
        - reserveRemainingAmount
        - monthlyCashflowImpact
        - createdAt
        - installmentPlan
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/LoanSimulationStatus'
        approvedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when simulation was approved (null if PENDING)
        withdrawnAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when funds were withdrawn (null if not COMPLETED)
        amount:
          type: number
          format: double
          description: Principal loan amount
        termMonths:
          type: integer
          minimum: 6
          maximum: 30
          description: Loan term in months
        interestRateMonthly:
          type: number
          format: double
          description: Monthly interest rate (e.g., 0.025 = 2.5%)
        amortizationType:
          type: string
          enum: [PRICE]
          description: Amortization method (currently only PRICE supported)
        installmentAmount:
          type: number
          format: double
          description: Fixed monthly installment amount
        totalInterest:
          type: number
          format: double
          description: Total interest paid over loan term
        totalCost:
          type: number
          format: double
          description: Total cost (principal + interest)
        reserveUsagePercent:
          type: number
          format: double
          description: Percentage of emergency reserve used
        reserveRemainingAmount:
          type: number
          format: double
          description: Emergency reserve remaining after loan
        monthlyCashflowImpact:
          type: number
          format: double
          description: Monthly cash outflow (equals installmentAmount)
        createdAt:
          type: string
          format: date-time
        installmentPlan:
          type: array
          items:
            $ref: '#/components/schemas/InstallmentBreakdown'

    LoanSimulationSummary:
      type: object
      required:
        - id
        - createdAt
        - amount
        - termMonths
        - interestRateMonthly
        - installmentAmount
        - status
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/LoanSimulationStatus'
        approvedAt:
          type: string
          format: date-time
          nullable: true
        withdrawnAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        amount:
          type: number
          format: double
        termMonths:
          type: integer
        interestRateMonthly:
          type: number
          format: double
        installmentAmount:
          type: number
          format: double

    InstallmentBreakdown:
      type: object
      required:
        - installmentNumber
        - principalComponent
        - interestComponent
        - totalPayment
        - remainingBalance
      properties:
        installmentNumber:
          type: integer
          minimum: 1
        principalComponent:
          type: number
          format: double
        interestComponent:
          type: number
          format: double
        totalPayment:
          type: number
          format: double
        remainingBalance:
          type: number
          format: double

    BalanceSnapshot:
      type: object
      required:
        - emergencyReserveBefore
        - emergencyReserveAfter
        - availableBalanceBefore
        - availableBalanceAfter
      properties:
        emergencyReserveBefore:
          type: number
          format: double
          description: Emergency reserve balance before withdrawal
        emergencyReserveAfter:
          type: number
          format: double
          description: Emergency reserve balance after withdrawal
        availableBalanceBefore:
          type: number
          format: double
          description: Available balance before withdrawal
        availableBalanceAfter:
          type: number
          format: double
          description: Available balance after withdrawal

    ApprovalResponse:
      type: object
      required:
        - simulation
        - message
      properties:
        simulation:
          $ref: '#/components/schemas/LoanSimulationDetails'
        message:
          type: string
          example: "Loan simulation approved successfully"

    WithdrawalResponse:
      type: object
      required:
        - simulation
        - balances
        - message
      properties:
        simulation:
          $ref: '#/components/schemas/LoanSimulationDetails'
        balances:
          $ref: '#/components/schemas/BalanceSnapshot'
        message:
          type: string
          example: "Funds withdrawn successfully. Amount transferred to available balance."

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message

  responses:
    UnauthorizedError:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Unauthorized"
