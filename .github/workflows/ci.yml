name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bfin_backend_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bfin_backend_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run db:migrate
      - run: npm test -- --coverage
      - run: npm run build
      # O job sonar consome o lcov (quality gate exige coverage em new code).
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info

  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep scan --config p/typescript --config p/security-audit --error

  jscpd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Threshold calibrado no ADR-0003 (5,45% na adoção); apertar conforme refatora.
      - run: npx jscpd src --ignore "**/*.test.ts" --threshold 6

  sonar:
    # Depende do ci só pelo artifact de coverage.
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Histórico completo para o SonarCloud calcular new code corretamente.
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage
      - uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          # Job falha se o quality gate reprovar — exigível como required check.
          args: -Dsonar.qualitygate.wait=true

  pr-title:
    # Squash merge usa o título do PR como commit da main — validar aqui é o
    # que garante o histórico padronizado (ADR-0004).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
