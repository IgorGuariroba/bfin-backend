# Compose de produção (Dokploy). O volume pgdata e a rede dokploy-network já
# existem (criados pelo stack do bfin-app) e são reaproveitados aqui — o
# bfin-backend passa a ser dono do schema/migrations do mesmo Postgres.
#
# db fica só em dokploy-network (não em rede própria do projeto): é a mesma
# rede compartilhada que o bfin-app já usa hoje pro Traefik, então o app
# alcança o hostname `db` sem precisar criar rede nova nem mudar DATABASE_URL.
#
# ORDEM DE DEPLOY IMPORTA: este stack precisa subir (com healthcheck do db OK)
# antes do dokploy-compose.yml do bfin-app ser redeployado sem seu próprio
# `db` — do contrário, os dois processos Postgres escreveriam no mesmo volume
# externo bfin-app_pgdata ao mesmo tempo (corrupção).
services:
  backend:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  dokploy-network:
    external: true

volumes:
  pgdata:
    external: true
    name: bfin-app_pgdata
