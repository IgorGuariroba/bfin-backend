services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: bfin-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgresql://bfin_user:bfin_pass@postgres:5432/bfin_dev
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      PORT: 3000
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: bfin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bfin_user
      POSTGRES_PASSWORD: bfin_pass
      POSTGRES_DB: bfin_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bfin-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
